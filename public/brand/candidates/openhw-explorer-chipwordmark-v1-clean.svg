<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 180" role="img" aria-labelledby="title desc">
  <title id="title">OpenHW Explorer chip wordmark candidate V1</title>
  <desc id="desc">Clean white chip mark paired with a two-line OpenHW Explorer wordmark.</desc>
  <defs>
    <linearGradient id="chipFace" x1="28" x2="120" y1="26" y2="122">
      <stop stop-color="#FFFFFF" />
      <stop offset="1" stop-color="#F7FAFF" />
    </linearGradient>
    <filter id="chipShadow" x="-12%" y="-12%" width="124%" height="128%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#082454" flood-opacity="0.14" />
    </filter>
  </defs>
  <rect width="540" height="180" rx="24" fill="#FFFFFF" />
  <g transform="translate(22 16)">
    <g fill="#9CA6B2">
      <rect x="35" y="0" width="8" height="16" rx="1.4" />
      <rect x="53" y="0" width="8" height="16" rx="1.4" />
      <rect x="71" y="0" width="8" height="16" rx="1.4" />
      <rect x="89" y="0" width="8" height="16" rx="1.4" />
      <rect x="35" y="116" width="8" height="16" rx="1.4" />
      <rect x="53" y="116" width="8" height="16" rx="1.4" />
      <rect x="71" y="116" width="8" height="16" rx="1.4" />
      <rect x="89" y="116" width="8" height="16" rx="1.4" />
      <rect x="0" y="35" width="16" height="8" rx="1.4" />
      <rect x="0" y="53" width="16" height="8" rx="1.4" />
      <rect x="0" y="71" width="16" height="8" rx="1.4" />
      <rect x="0" y="89" width="16" height="8" rx="1.4" />
      <rect x="116" y="35" width="16" height="8" rx="1.4" />
      <rect x="116" y="53" width="16" height="8" rx="1.4" />
      <rect x="116" y="71" width="16" height="8" rx="1.4" />
      <rect x="116" y="89" width="16" height="8" rx="1.4" />
    </g>
    <rect x="16" y="16" width="100" height="100" rx="13" fill="url(#chipFace)" stroke="#082454" stroke-width="5" filter="url(#chipShadow)" />
    <text x="29" y="80" font-family="Inter, Arial Black, Arial, sans-serif" font-size="42" font-weight="900" letter-spacing="-4.2">
      <tspan fill="#082454">OH</tspan><tspan fill="#18A957" dx="-2">X</tspan>
    </text>
  </g>
  <g transform="translate(174 30)">
    <text x="0" y="42" fill="#071B3E" font-family="Inter, Arial, Helvetica, sans-serif" font-size="48" font-weight="820" letter-spacing="-1.8">OpenHW</text>
    <text x="0" y="88" fill="#0B5CAB" font-family="Inter, Arial, Helvetica, sans-serif" font-size="48" font-weight="820" letter-spacing="-1.5">Explorer</text>
    <text x="2" y="124" fill="#8B949E" font-family="Inter, Arial, Helvetica, sans-serif" font-size="14" font-weight="760" letter-spacing="3.8">EXPLORE</text>
    <circle cx="95" cy="119.5" r="2.8" fill="#18A957" />
    <text x="111" y="124" fill="#8B949E" font-family="Inter, Arial, Helvetica, sans-serif" font-size="14" font-weight="760" letter-spacing="3.8">LEARN</text>
    <circle cx="190" cy="119.5" r="2.8" fill="#18A957" />
    <text x="206" y="124" fill="#8B949E" font-family="Inter, Arial, Helvetica, sans-serif" font-size="14" font-weight="760" letter-spacing="3.8">BUILD</text>
  </g>
</svg>
