<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 180" role="img" aria-labelledby="title desc">
  <title id="title">OpenHW Explorer chip wordmark candidate V4</title>
  <desc id="desc">Minimal chip outline with large internal OHX for high readability.</desc>
  <rect width="540" height="180" rx="24" fill="#FFFFFF" />
  <g transform="translate(28 24)">
    <g fill="#A3ADB8">
      <rect x="34" y="0" width="9" height="13" rx="2" />
      <rect x="73" y="0" width="9" height="13" rx="2" />
      <rect x="34" y="105" width="9" height="13" rx="2" />
      <rect x="73" y="105" width="9" height="13" rx="2" />
      <rect x="0" y="34" width="13" height="9" rx="2" />
      <rect x="0" y="73" width="13" height="9" rx="2" />
      <rect x="105" y="34" width="13" height="9" rx="2" />
      <rect x="105" y="73" width="13" height="9" rx="2" />
    </g>
    <rect x="13" y="13" width="92" height="92" rx="16" fill="#FFFFFF" stroke="#082454" stroke-width="5.8" />
    <text x="25" y="75" font-family="Inter, Arial Black, Arial, sans-serif" font-size="40" font-weight="900" letter-spacing="-4">
      <tspan fill="#082454">OH</tspan><tspan fill="#18A957" dx="-2">X</tspan>
    </text>
  </g>
  <g transform="translate(174 31)">
    <text x="0" y="42" fill="#071B3E" font-family="Inter, Arial, Helvetica, sans-serif" font-size="49" font-weight="850" letter-spacing="-2.1">OpenHW</text>
    <text x="0" y="90" fill="#0B5CAB" font-family="Inter, Arial, Helvetica, sans-serif" font-size="49" font-weight="850" letter-spacing="-1.8">Explorer</text>
    <text x="3" y="125" fill="#87919D" font-family="Inter, Arial, Helvetica, sans-serif" font-size="14" font-weight="760" letter-spacing="3.7">EXPLORE</text>
    <circle cx="96" cy="120.5" r="2.8" fill="#18A957" />
    <text x="112" y="125" fill="#87919D" font-family="Inter, Arial, Helvetica, sans-serif" font-size="14" font-weight="760" letter-spacing="3.7">LEARN</text>
    <circle cx="190" cy="120.5" r="2.8" fill="#18A957" />
    <text x="206" y="125" fill="#87919D" font-family="Inter, Arial, Helvetica, sans-serif" font-size="14" font-weight="760" letter-spacing="3.7">BUILD</text>
  </g>
</svg>
