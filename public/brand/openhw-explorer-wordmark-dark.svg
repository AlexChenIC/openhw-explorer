<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 150" role="img" aria-labelledby="title desc">
  <title id="title">OpenHW Explorer wordmark for dark backgrounds</title>
  <desc id="desc">OpenHW Explorer wordmark with a deep blue OH mark, a stylized X, and Explore Learn Build tagline.</desc>
  <defs>
    <linearGradient id="openhw-explorer-mark-gradient" x1="26" x2="112" y1="18" y2="126">
      <stop stop-color="#0D63D8" />
      <stop offset="0.48" stop-color="#073D82" />
      <stop offset="1" stop-color="#061B3F" />
    </linearGradient>
    <filter id="openhw-explorer-mark-shadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.24" />
    </filter>
  </defs>
  <rect x="20" y="20" width="104" height="104" rx="29" fill="url(#openhw-explorer-mark-gradient)" filter="url(#openhw-explorer-mark-shadow)" />
  <path fill="#FFFFFF" fill-rule="evenodd" d="M42 42h27a10 10 0 0 1 10 10v14a10 10 0 0 1-10 10H42a10 10 0 0 1-10-10V52a10 10 0 0 1 10-10Zm3 12v10h21V54H45Z" />
  <path fill="#FFFFFF" d="M84 42h10v13h19V42h10v34h-10V65H94v11H84V42Z" />
  <path d="M42 101 91 72M52 74l51 34" fill="none" stroke="#FFFFFF" stroke-linecap="square" stroke-linejoin="round" stroke-width="12" />
  <path d="M96 101h25L92 76Z" fill="#18A957" />
  <text x="152" y="62" fill="#FFFFFF" font-family="Inter, Arial, Helvetica, system-ui, sans-serif" font-size="44" font-weight="800" letter-spacing="-1.8">OpenHW</text>
  <text x="152" y="104" fill="#67A7FF" font-family="Inter, Arial, Helvetica, system-ui, sans-serif" font-size="44" font-weight="800" letter-spacing="-1.5">Explorer</text>
  <text x="154" y="132" fill="#A5B4C7" font-family="Inter, Arial, Helvetica, system-ui, sans-serif" font-size="14" font-weight="700" letter-spacing="3.9">EXPLORE</text>
  <circle cx="247" cy="127.5" r="2.7" fill="#18A957" />
  <text x="260" y="132" fill="#A5B4C7" font-family="Inter, Arial, Helvetica, system-ui, sans-serif" font-size="14" font-weight="700" letter-spacing="3.9">LEARN</text>
  <circle cx="341" cy="127.5" r="2.7" fill="#18A957" />
  <text x="354" y="132" fill="#A5B4C7" font-family="Inter, Arial, Helvetica, system-ui, sans-serif" font-size="14" font-weight="700" letter-spacing="3.9">BUILD</text>
</svg>
